# viewer — a micro HTML/Markdown document viewer (LCD launcher program).
#
# Named "viewer" (not "browser") to avoid confusion with the user's web browser.
# Renders a growing subset of HTML — and Markdown (converted to HTML on-device
# via the vendored MD4C) — into LVGL on the LCD. The whole viewer (parser, IR,
# renderer, launcher program, CLI verb, http(s) fetch) lives in conditional
# slices and registers via the when:-gated ViewerApp service.
#
# ViewerService registers the `webview` CLI verb (sets viewer.web.url so the
# browser-side viewer window pops open); the LCD viewer + `lcdview` verb live in
# the when:-gated ViewerApp service (an LcdApp).
#
# Markdown→HTML is done server-side: conditional/spangap-web/ registers a .md
# file-extension transform with the web server (ViewerWebService, gated on
# spangap-web), so *.md / *.md.gz are converted on-device and served as
# text/html. The welcome/about help pages ship as data/webroot/{WELCOME,ABOUT}.md.
#
# Browser side (browser/): a "Viewer" Dock app — a floating window that loads a
# URL straight into an <iframe> from the device's web server (same origin →
# cookies, images, links all work; .md arrives pre-rendered as HTML).
#
# Config (s.viewer.*, all unset by default): once_lcd / once_web one-shot auto-open
# (consumed after firing); home_lcd / home_web where a manual launch goes (falls
# back to the welcome page).
schema_version: 1
name: spangap/viewer
prefix: viewer
version: 0.0.0
firmware: esp-idf
browser: browser
platforms: [idf]
# spangap-core is implicit (the empty-prefix platform foundation) — not listed.
# spangap-net is a SOFT dep: the http(s) fetcher lives in conditional/spangap-net/
# (compiled only when net is staged) and is #if CONFIG_SPANGAP_NET-gated in the
# viewer. Without net the viewer still builds and serves file:// only.
additional_installs:
  - spangap/spangap-net
# Boot-registered services. ViewerService (core) registers the `webview` CLI
# verb. ViewerApp is an LcdApp — its onInit installs the launcher tile and its
# appInit does the LCD boot wiring (nav worker, `lcdview` verb, Settings pane);
# gated on spangap-lcd. ViewerWebService registers the Markdown→HTML .md
# transform with the web server; gated on spangap-web (NOT spangap-lcd), so it
# runs on headless builds too — the LCD viewer fetches the converted HTML from
# localhost.
services:
  - { class: ViewerService, header: viewer.h }
  - { class: ViewerApp, header: viewer_app.h, when: spangap/spangap-lcd }
  - { class: ViewerWebService, header: viewer_web.h, when: spangap/spangap-web }
# Browser auto-registration: adds the "Viewer" Dock app (registerApp) and
# subscribes to viewer.web.url. The buildable's MainLayout also mounts
# ViewerWindow (parallel to NomadWindow/MapWindow).
browser_register:
  - call: registerViewer
